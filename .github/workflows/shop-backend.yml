name: shop-backend API Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: shop-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          SECRET_KEY: test-secret-key
        run: >
          pytest
          --html=reports/shop-backend-api-test-report.html
          --self-contained-html
          --cov=app
          --cov-report=term-missing
          --cov-report=html:reports/shop-backend-api-coverage-report

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: shop-backend-api-test-report
          path: shop-backend/reports/shop-backend-api-test-report.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: shop-backend-api-coverage-report
          path: shop-backend/reports/shop-backend-api-coverage-report